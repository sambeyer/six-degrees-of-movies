name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REGISTRY: australia-southeast2-docker.pkg.dev
  IMAGE_REPO: australia-southeast2-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/actor-game/actor-game

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        run: echo "IMAGE_TAG=$(date +%Y-%m-%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      # ── Python + dependencies ──────────────────────────────────────────────

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      # ── Unit tests ─────────────────────────────────────────────────────────

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      # ── Authenticate with GCP ──────────────────────────────────────────────

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Check if image already exists in registry
        run: |
          if gcloud artifacts docker images describe "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}" --quiet 2>/dev/null; then
            echo "Image already exists — skipping build and tests."
            echo "IMAGE_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "IMAGE_EXISTS=false" >> "$GITHUB_ENV"
          fi

      # ── Build image ────────────────────────────────────────────────────────

      - name: Build Docker image
        if: env.IMAGE_EXISTS != 'true'
        run: |
          docker build \
            --platform linux/amd64 \
            -t "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}" \
            .

      # ── Run container + integration tests ──────────────────────────────────

      - name: Start container
        if: env.IMAGE_EXISTS != 'true'
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
          docker run -d \
            --name actor-game-test \
            -p 8000:8080 \
            -e ACTOR_GAME_DATA_DIR=/tmp/actor-game \
            -e GCS_BUCKET=${{ vars.GCS_BUCKET }} \
            -e GOOGLE_APPLICATION_CREDENTIALS=/gcp-key.json \
            -v /tmp/gcp-key.json:/gcp-key.json:ro \
            "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"

      - name: Wait for server to be healthy
        if: env.IMAGE_EXISTS != 'true'
        run: |
          echo "Waiting for /api/info to respond (up to 10 min for DB download)..."
          for i in $(seq 1 60); do
            status=$(docker inspect --format='{{.State.Status}}' actor-game-test 2>/dev/null || echo "missing")
            if [[ "$status" != "running" ]]; then
              echo "Container exited unexpectedly (status: $status)."
              docker logs actor-game-test
              exit 1
            fi
            if curl -sf http://localhost:8000/api/info > /dev/null; then
              echo "Server is healthy."
              exit 0
            fi
            echo "  attempt $i/60 — retrying in 10s"
            sleep 10
          done
          echo "Server failed to become healthy in time."
          docker logs actor-game-test
          exit 1

      - name: Run integration tests
        if: env.IMAGE_EXISTS != 'true'
        run: uv run pytest tests/integration/ -v
        env:
          INTEGRATION_BASE_URL: http://localhost:8000

      - name: Stop container
        if: always() && env.IMAGE_EXISTS != 'true'
        run: docker rm -f actor-game-test

      # ── Push image and capture digest ──────────────────────────────────────

      - name: Push image
        if: env.IMAGE_EXISTS != 'true'
        run: |
          docker push "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}" | grep -oP 'sha256:[a-f0-9]+')
          echo "IMAGE_DIGEST=$DIGEST" >> "$GITHUB_ENV"

      - name: Get digest for existing image
        if: env.IMAGE_EXISTS == 'true'
        run: |
          DIGEST=$(gcloud artifacts docker images describe "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}" --format='get(image_summary.digest)')
          echo "IMAGE_DIGEST=$DIGEST" >> "$GITHUB_ENV"

      # ── Deploy via Terraform ───────────────────────────────────────────────
      # Must run before the Pages deploy — Terraform creates the Pages project
      # on first run, and wrangler deploy will fail if the project doesn't exist.

      - uses: hashicorp/setup-terraform@v3

      - name: Generate backend config
        run: |
          cat > terraform/backend.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ vars.TF_STATE_BUCKET }}"
              prefix = "actor-game"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
          IMAGE_DIGEST: ${{ env.IMAGE_DIGEST }}
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}

      # ── Deploy frontend to Cloudflare Pages ───────────────────────────────

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and deploy frontend to Cloudflare Pages
        run: |
          cd frontend
          npm ci
          npm run build
          npx wrangler@3 pages deploy dist \
            --project-name=sixdegreesofmovies \
            --branch=main \
            --commit-hash=${{ github.sha }} \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
